<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login Form</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .login-box{
        width: 350px;
        padding: 40px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        text-align: center;
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from{
            opacity: 0;
            transform: translateY(30px);
        }
        to{
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-box h2{
        color: #fff;
        margin-bottom: 20px;
    }

    .input-box{
        position: relative;
        margin-bottom: 30px;
    }

    .input-box input{
        width: 100%;
        padding: 10px;
        background: transparent;
        border: none;
        border-bottom: 2px solid #fff;
        outline: none;
        color: #fff;
        font-size: 16px;
        transition: 0.3s;
    }

    .input-box label{
        position: absolute;
        top: 10px;
        left: 0;
        color: #ddd;
        pointer-events: none;
        transition: 0.3s;
    }

    .input-box input:focus ~ label,
    .input-box input:valid ~ label{
        top: -15px;
        font-size: 12px;
        color: #fff;
    }

    .input-box input:focus{
        border-color: #00f7ff;
        box-shadow: 0 5px 10px rgba(0,247,255,0.3);
    }

    button{
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #00f7ff, #00ff88);
        color: #000;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        position: relative;
        overflow: hidden;
    }

    button:hover{
        transform: scale(1.05);
        box-shadow: 0 0 15px #00ffcc;
    }

    /* Ripple effect */
    button::after{
        content: "";
        position: absolute;
        width: 0;
        height: 0;
        background: rgba(255,255,255,0.5);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.5s, height 0.5s;
    }

    button:active::after{
        width: 200px;
        height: 200px;
    }

    p{
        margin-top: 15px;
        color: #fff;
        font-size: 14px;
        opacity: 0.8;
        transition: 0.3s;
    }

    p:hover{
        color: #00ffcc;
        letter-spacing: 1px;
    }

</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <div class="input-box">
            <input type="email" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" required>
            <label>Password</label>
        </div>

        <button type="submit">Login</button>

        <p>Welcome back! Please login to continue 🚀</p>
    </form>
</div>

</body>
</html>
